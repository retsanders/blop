name: Blop
options:
  bundleIdPrefix: com.robsanders
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_BUNDLE_IDENTIFIER: com.robsanders.blop
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    INFOPLIST_FILE: Blop/Info.plist

targets:
  BlopTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: BlopTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robsanders.blopTests
    dependencies:
      - target: Blop

  Blop:
    type: application
    platform: iOS
    sources:
      - path: Blop
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.robsanders.blop
    info:
      path: Blop/Info.plist
      properties:
        UILaunchStoryboardName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: true
